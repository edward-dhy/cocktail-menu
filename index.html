<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liverpool Memories</title>
  <style>
    :root {
      --bg-ink: #211720;
      --rose: #e7a9b0;
      --blush-gold: #e7c4a0;
      --cream: #f4e8e6;
      --muted: #cda9b0;
      --rouge: #ef8f9b;
      --card: rgba(255, 250, 250, 0.055);
      --card-strong: rgba(255, 238, 240, 0.105);
      --line: rgba(231, 169, 176, 0.34);
      --shadow: rgba(17, 8, 18, 0.42);
      --accent: var(--rose);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg-ink);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--cream);
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      background:
        radial-gradient(circle at 22% 7%, rgba(236, 166, 176, 0.42) 0 18rem, rgba(236, 166, 176, 0) 32rem),
        radial-gradient(circle at 78% 12%, rgba(231, 196, 160, 0.30) 0 13rem, rgba(231, 196, 160, 0) 29rem),
        radial-gradient(circle at 50% 46%, rgba(137, 82, 113, 0.24) 0 18rem, rgba(137, 82, 113, 0) 34rem),
        linear-gradient(180deg, #593142 0%, #3d263b 38%, #211720 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0) 31%),
        radial-gradient(circle at 14% 78%, rgba(231, 169, 176, 0.12), transparent 23rem);
      mix-blend-mode: screen;
    }

    .page {
      width: min(100%, 72rem);
      margin: 0 auto;
      padding: 2rem 1rem 1.5rem;
    }

    .hero {
      padding: 2rem 0 1.45rem;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--blush-gold);
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    .name-zh {
      font-family: "Playfair Display", "Cormorant Garamond", "Songti SC", "STSong", serif;
      font-weight: 600;
    }

    h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(2.75rem, 13vw, 6.2rem);
      line-height: 0.95;
      text-wrap: balance;
      text-shadow: 0 0.8rem 2.6rem rgba(44, 14, 28, 0.52);
    }

    .subtitle {
      margin: 1rem auto 0;
      max-width: 22rem;
      color: var(--muted);
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.02rem, 4.2vw, 1.35rem);
      font-style: italic;
    }

    .menu {
      display: grid;
      gap: 1rem;
      padding: 0.35rem 0 1.25rem;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
      min-height: 20rem;
      padding: 1.15rem;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 250, 250, 0.078), rgba(255, 250, 250, 0.024)),
        var(--card);
      box-shadow: 0 1.4rem 3.4rem var(--shadow), inset 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -5rem;
      bottom: -5rem;
      width: 13rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(231, 196, 160, 0.09);
      filter: blur(1rem);
    }

    .copy {
      position: relative;
      z-index: 1;
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 1rem;
    }

    .name-zh {
      margin: 0;
      color: var(--cream);
      font-size: clamp(2rem, 9vw, 3.45rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .name-en {
      margin: 0.28rem 0 0;
      color: var(--blush-gold);
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: 1.06rem;
      font-style: italic;
    }

    .ingredients {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin: 0.85rem 0 0;
      padding: 0;
      list-style: none;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 2rem;
      padding: 0.34rem 0.76rem;
      border: 1px solid rgba(231, 169, 176, 0.33);
      border-radius: 999px;
      color: #f6d4cf;
      background: rgba(231, 169, 176, 0.125);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.055);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .note {
      margin: 0;
      color: var(--rouge);
      font-size: 0.96rem;
      font-style: italic;
    }

    .glass-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 9.6rem;
      place-items: center;
      color: var(--accent);
    }

    .glass {
      width: min(58vw, 13.8rem);
      height: auto;
      opacity: 0.92;
      filter: drop-shadow(0 1rem 1.5rem rgba(18, 7, 17, 0.34));
    }

    .glass .drink {
      color: var(--rouge);
      opacity: 0.36;
    }

    .glass .shine {
      color: #fff4ef;
      opacity: 0.42;
    }

    footer {
      padding: 0.8rem 0 0.6rem;
      color: rgba(205, 169, 176, 0.72);
      text-align: center;
      font-size: 0.82rem;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    @media (min-width: 42rem) {
      .page {
        padding: 3rem 1.5rem 2rem;
      }

      .hero {
        padding: 2.8rem 0 2.1rem;
      }

      .menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.1rem;
      }

      .card {
        min-height: 24rem;
        padding: 1.35rem;
      }
    }

    @media (min-width: 58rem) {
      .menu {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .card {
        grid-column: span 3;
        grid-template-columns: minmax(0, 1.05fr) minmax(10rem, 0.75fr);
        align-items: stretch;
      }

      .card:nth-child(5) {
        grid-column: 2 / span 4;
      }

      .glass-wrap {
        min-height: 100%;
      }

      .glass {
        width: min(18vw, 14.5rem);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">cocktail menu</p>
      <h1>Liverpool Memories</h1>
      <p class="subtitle">for the reunion of Shandong Big 3</p>
    </header>

    <section class="menu" id="menu" aria-label="鸡尾酒菜单"></section>

    <footer>聚会信息占位 · Liverpool Memories</footer>
  </main>

  <script>
    const cocktails = [
      {
        nameZh: "床笫之间",
        nameEn: "Between the Sheet",
        ingredients: ["白兰地", "白朗姆", "君度", "柠檬汁"],
        note: "求求你别扣我",
        glass: "coupe"
      },
      {
        nameZh: "苹果马天尼",
        nameEn: "Appletini",
        ingredients: ["金酒", "苹果利口酒", "君度"],
        note: "北欧的回忆",
        glass: "martini"
      },
      {
        nameZh: "红粉佳人",
        nameEn: "Pink Lady",
        ingredients: ["金酒", "苹果利口酒", "柠檬汁", "红石榴糖浆", "蛋清"],
        note: "粉不粉红不知道，但一定红温了",
        glass: "coupe"
      },
      {
        nameZh: "绿色心情",
        nameEn: "Green emo",
        ingredients: ["白朗姆", "苹果利口酒", "青柠汁", "糖浆"],
        note: "喝了就不许EMO啦",
        glass: "coupe"
      },
      {
        nameZh: "大都会",
        nameEn: "Cosmopolitan",
        ingredients: ["金酒", "君度", "蔓越莓汁", "青柠汁"],
        note: "伯明翰怎么不是大都会",
        glass: "martini"
      }
    ];

    // 杯型插画：内联 SVG（带 viewBox 保证纵向比例正确，且 .drink/.shine 样式能直接生效）。
    // 四种杯型都保留备用，本页用到 coupe 与 martini。
    const glassSvgs = {
      coupe: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M33 24h94c-1 35-20 60-47 60S34 59 33 24Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M42 38h76c-5 24-21 38-38 38S47 62 42 38Z" fill="currentColor"/>
            <path d="M80 84v78M53 170h54" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path class="shine" d="M55 30c5 18 13 29 25 35" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`,
      martini: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M25 25h110L80 92 25 25Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M38 36h84L80 84 38 36Z" fill="currentColor"/>
            <path d="M80 92v70M52 170h56" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path class="shine" d="M49 33l29 35" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`,
      highball: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M48 24h64l-7 146H55L48 24Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M56 72h48l-5 91H61L56 72Z" fill="currentColor"/>
            <path class="shine" d="M68 36l-3 118" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M58 55h46" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
          </svg>`,
      rocks: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M40 48h80l-10 118H50L40 48Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M49 88h62l-7 72H56L49 88Z" fill="currentColor"/>
            <path d="M62 73h23v21H62zM85 74h22v21H85z" fill="none" stroke="currentColor" stroke-width="3" opacity="0.55"/>
            <path class="shine" d="M61 59l-4 91" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`
    };

    const menu = document.querySelector("#menu");

    cocktails.forEach((cocktail) => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="copy">
          <div>
            <h2 class="name-zh">${cocktail.nameZh}</h2>
            <p class="name-en">${cocktail.nameEn}</p>
            <ul class="ingredients">
              ${cocktail.ingredients.map((item) => `<li class="chip">${item}</li>`).join("")}
            </ul>
          </div>
          <p class="note">${cocktail.note}</p>
        </div>
        <div class="glass-wrap" aria-hidden="true">
          ${glassSvgs[cocktail.glass] || glassSvgs.coupe}
        </div>
      `;
      menu.appendChild(card);
    });
  </script>
</body>
</html>
