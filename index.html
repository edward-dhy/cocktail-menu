<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liverpool Memories</title>
  <style>
    :root {
      --bg-ink: #211720;
      --rose: #e7a9b0;
      --blush-gold: #e7c4a0;
      --cream: #f4e8e6;
      --muted: #cda9b0;
      --rouge: #ef8f9b;
      --card: rgba(255, 250, 250, 0.055);
      --card-strong: rgba(255, 238, 240, 0.105);
      --line: rgba(231, 169, 176, 0.34);
      --shadow: rgba(17, 8, 18, 0.42);
      --accent: var(--rose);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg-ink);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--cream);
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      background:
        radial-gradient(circle at 22% 7%, rgba(236, 166, 176, 0.42) 0 18rem, rgba(236, 166, 176, 0) 32rem),
        radial-gradient(circle at 78% 12%, rgba(231, 196, 160, 0.30) 0 13rem, rgba(231, 196, 160, 0) 29rem),
        radial-gradient(circle at 50% 46%, rgba(137, 82, 113, 0.24) 0 18rem, rgba(137, 82, 113, 0) 34rem),
        linear-gradient(180deg, #593142 0%, #3d263b 38%, #211720 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0) 31%),
        radial-gradient(circle at 14% 78%, rgba(231, 169, 176, 0.12), transparent 23rem);
      mix-blend-mode: screen;
    }

    .page {
      width: min(100%, 72rem);
      margin: 0 auto;
      padding: 2rem 1rem 1.5rem;
    }

    .hero {
      padding: 2rem 0 1.45rem;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--blush-gold);
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    .name-zh {
      font-family: "Playfair Display", "Cormorant Garamond", "Songti SC", "STSong", serif;
      font-weight: 600;
    }

    h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(2.75rem, 13vw, 6.2rem);
      line-height: 0.95;
      text-wrap: balance;
      text-shadow: 0 0.8rem 2.6rem rgba(44, 14, 28, 0.52);
    }

    .subtitle {
      margin: 1rem auto 0;
      max-width: 22rem;
      color: var(--muted);
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.02rem, 4.2vw, 1.35rem);
      font-style: italic;
    }

    .menu {
      display: grid;
      gap: 1rem;
      padding: 0.35rem 0 1.25rem;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
      min-height: 20rem;
      padding: 1.15rem;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 250, 250, 0.078), rgba(255, 250, 250, 0.024)),
        var(--card);
      box-shadow: 0 1.4rem 3.4rem var(--shadow), inset 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -5rem;
      bottom: -5rem;
      width: 13rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(231, 196, 160, 0.09);
      filter: blur(1rem);
    }

    .copy {
      position: relative;
      z-index: 1;
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 1rem;
    }

    .name-zh {
      margin: 0;
      color: var(--cream);
      font-size: clamp(2rem, 9vw, 3.45rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .name-en {
      margin: 0.28rem 0 0;
      color: var(--blush-gold);
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: 1.06rem;
      font-style: italic;
    }

    .ingredients {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin: 0.85rem 0 0;
      padding: 0;
      list-style: none;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 2rem;
      padding: 0.34rem 0.76rem;
      border: 1px solid rgba(231, 169, 176, 0.33);
      border-radius: 999px;
      color: #f6d4cf;
      background: rgba(231, 169, 176, 0.125);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.055);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .note {
      margin: 0;
      color: var(--rouge);
      font-size: 0.96rem;
      font-style: italic;
    }

    .glass-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 9.6rem;
      place-items: center;
      color: var(--accent);
    }

    .glass {
      width: min(58vw, 13.8rem);
      height: auto;
      opacity: 0.92;
      filter: drop-shadow(0 1rem 1.5rem rgba(18, 7, 17, 0.34));
    }

    .glass .drink {
      color: var(--rouge);
      opacity: 0.36;
    }

    .glass .shine {
      color: #fff4ef;
      opacity: 0.42;
    }

    footer {
      padding: 0.8rem 0 0.6rem;
      color: rgba(205, 169, 176, 0.72);
      text-align: center;
      font-size: 0.82rem;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    @media (min-width: 42rem) {
      .page {
        padding: 3rem 1.5rem 2rem;
      }

      .hero {
        padding: 2.8rem 0 2.1rem;
      }

      .menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.1rem;
      }

      .card {
        min-height: 24rem;
        padding: 1.35rem;
      }
    }

    @media (min-width: 58rem) {
      .menu {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .card {
        grid-column: span 3;
        grid-template-columns: minmax(0, 1.05fr) minmax(10rem, 0.75fr);
        align-items: stretch;
      }

      .card:nth-child(5) {
        grid-column: 2 / span 4;
      }

      .glass-wrap {
        min-height: 100%;
      }

      .glass {
        width: min(18vw, 14.5rem);
      }
    }
    /* —— 留言触发按钮 —— */
    .copy-foot {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .msg-trigger {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.42rem 0.9rem;
      border: 1px solid rgba(231, 169, 176, 0.45);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(231, 169, 176, 0.14);
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .msg-trigger:hover,
    .msg-trigger:focus-visible {
      background: rgba(231, 169, 176, 0.24);
      border-color: var(--rose);
      outline: none;
      transform: translateY(-1px);
    }

    .msg-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.3rem;
      height: 1.3rem;
      padding: 0 0.36rem;
      border-radius: 999px;
      background: var(--rose);
      color: #3a1b25;
      font-size: 0.76rem;
      font-weight: 700;
    }

    /* —— 留言弹层 —— */
    .msg-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(20, 10, 18, 0.62);
      backdrop-filter: blur(4px);
    }

    .msg-overlay[hidden] { display: none; }

    .msg-sheet {
      position: relative;
      width: min(100%, 34rem);
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1.2rem 1.2rem;
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 22px 22px 0 0;
      background: linear-gradient(180deg, rgba(89, 49, 66, 0.96), rgba(33, 23, 32, 0.98));
      box-shadow: 0 -1.4rem 3rem rgba(10, 4, 10, 0.5);
      animation: sheetUp 0.26s ease;
    }

    @keyframes sheetUp {
      from { transform: translateY(8%); opacity: 0.6; }
      to { transform: translateY(0); opacity: 1; }
    }

    .msg-close {
      position: absolute;
      top: 0.7rem;
      right: 0.8rem;
      width: 2.1rem;
      height: 2.1rem;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--cream);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }

    .msg-close:hover { background: rgba(255, 255, 255, 0.16); }

    .msg-head { padding-right: 2.2rem; }

    .msg-title {
      margin: 0;
      font-family: "Playfair Display", "Cormorant Garamond", "Songti SC", serif;
      font-weight: 600;
      font-size: 1.9rem;
      color: var(--cream);
    }

    .msg-sub {
      margin: 0.15rem 0 0;
      color: var(--blush-gold);
      font-family: "Playfair Display", Georgia, serif;
      font-style: italic;
      font-size: 1rem;
    }

    .msg-list {
      flex: 1;
      min-height: 4rem;
      margin: 1rem 0;
      padding-right: 0.3rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .msg-empty {
      margin: auto;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .msg-item {
      padding: 0.7rem 0.85rem;
      border: 1px solid rgba(231, 169, 176, 0.22);
      border-radius: 14px;
      background: rgba(255, 250, 250, 0.05);
    }

    .msg-item-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }

    .msg-name { color: var(--rose); font-weight: 700; font-size: 0.95rem; word-break: break-word; }
    .msg-time { color: var(--muted); font-size: 0.74rem; flex: none; }
    .msg-body { margin: 0; color: var(--cream); font-size: 0.98rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

    .msg-form { display: flex; flex-direction: column; gap: 0.6rem; }
    .msg-form[hidden] { display: none; }

    .msg-nick,
    .msg-text {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid rgba(231, 169, 176, 0.3);
      border-radius: 12px;
      background: rgba(20, 12, 18, 0.5);
      color: var(--cream);
      font: inherit;
      font-size: 0.96rem;
      resize: none;
    }

    .msg-nick::placeholder,
    .msg-text::placeholder { color: rgba(205, 169, 176, 0.6); }
    .msg-nick:focus,
    .msg-text:focus { outline: none; border-color: var(--rose); }

    .msg-inputrow { display: flex; gap: 0.55rem; align-items: stretch; }
    .msg-inputrow .msg-text { flex: 1; }

    .msg-send {
      flex: none;
      padding: 0 1.1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--rose), var(--rouge));
      color: #2b121c;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .msg-send:disabled { opacity: 0.55; cursor: default; }
    .msg-send:hover:not(:disabled) { filter: brightness(1.06); }

    @media (min-width: 42rem) {
      .msg-overlay { align-items: center; padding: 1.5rem; }
      .msg-sheet { border-radius: 22px; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">cocktail menu</p>
      <h1>Liverpool Memories</h1>
      <p class="subtitle">for the reunion of Shandong Big 3</p>
    </header>

    <section class="menu" id="menu" aria-label="鸡尾酒菜单"></section>

    <footer>聚会信息占位 · Liverpool Memories</footer>
  </main>

  <!-- 留言弹层 -->
  <div id="msgOverlay" class="msg-overlay" hidden>
    <div class="msg-sheet" role="dialog" aria-modal="true" aria-labelledby="msgTitle" tabindex="-1">
      <button type="button" class="msg-close" aria-label="关闭">×</button>
      <header class="msg-head">
        <h3 id="msgTitle" class="msg-title"></h3>
        <p class="msg-sub"></p>
      </header>
      <div class="msg-list" id="msgList"></div>
      <form class="msg-form" id="msgForm" autocomplete="off">
        <input class="msg-nick" id="msgNick" type="text" maxlength="40" placeholder="你的昵称（可留空）" autocomplete="nickname">
        <div class="msg-inputrow">
          <textarea class="msg-text" id="msgText" rows="2" maxlength="500" placeholder="写句话给大家…"></textarea>
          <button class="msg-send" id="msgSend" type="submit">发送</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const cocktails = [
      {
        nameZh: "床笫之间",
        nameEn: "Between the Sheet",
        ingredients: ["白兰地", "白朗姆", "君度", "柠檬汁"],
        note: "求求你别扣我",
        glass: "coupe"
      },
      {
        nameZh: "苹果马天尼",
        nameEn: "Appletini",
        ingredients: ["金酒", "苹果利口酒", "君度"],
        note: "北欧的回忆",
        glass: "martini"
      },
      {
        nameZh: "红粉佳人",
        nameEn: "Pink Lady",
        ingredients: ["金酒", "苹果利口酒", "柠檬汁", "红石榴糖浆", "蛋清"],
        note: "粉不粉红不知道，但一定红温了",
        glass: "coupe"
      },
      {
        nameZh: "绿色心情",
        nameEn: "Green emo",
        ingredients: ["白朗姆", "苹果利口酒", "青柠汁", "糖浆"],
        note: "喝了就不许EMO啦",
        glass: "coupe"
      },
      {
        nameZh: "大都会",
        nameEn: "Cosmopolitan",
        ingredients: ["金酒", "君度", "蔓越莓汁", "青柠汁"],
        note: "伯明翰怎么不是大都会",
        glass: "martini"
      }
    ];

    // 杯型插画：内联 SVG（带 viewBox 保证纵向比例正确，且 .drink/.shine 样式能直接生效）。
    // 四种杯型都保留备用，本页用到 coupe 与 martini。
    const glassSvgs = {
      coupe: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M33 24h94c-1 35-20 60-47 60S34 59 33 24Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M42 38h76c-5 24-21 38-38 38S47 62 42 38Z" fill="currentColor"/>
            <path d="M80 84v78M53 170h54" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path class="shine" d="M55 30c5 18 13 29 25 35" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`,
      martini: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M25 25h110L80 92 25 25Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M38 36h84L80 84 38 36Z" fill="currentColor"/>
            <path d="M80 92v70M52 170h56" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path class="shine" d="M49 33l29 35" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`,
      highball: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M48 24h64l-7 146H55L48 24Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M56 72h48l-5 91H61L56 72Z" fill="currentColor"/>
            <path class="shine" d="M68 36l-3 118" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M58 55h46" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
          </svg>`,
      rocks: `
          <svg class="glass" role="img" viewBox="0 0 160 190" preserveAspectRatio="xMidYMid meet">
            <path d="M40 48h80l-10 118H50L40 48Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <path class="drink" d="M49 88h62l-7 72H56L49 88Z" fill="currentColor"/>
            <path d="M62 73h23v21H62zM85 74h22v21H85z" fill="none" stroke="currentColor" stroke-width="3" opacity="0.55"/>
            <path class="shine" d="M61 59l-4 91" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>`
    };

    const menu = document.querySelector("#menu");

    cocktails.forEach((cocktail) => {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.drink = cocktail.nameZh;
      card.innerHTML = `
        <div class="copy">
          <div>
            <h2 class="name-zh">${cocktail.nameZh}</h2>
            <p class="name-en">${cocktail.nameEn}</p>
            <ul class="ingredients">
              ${cocktail.ingredients.map((item) => `<li class="chip">${item}</li>`).join("")}
            </ul>
          </div>
          <div class="copy-foot">
            <p class="note">${cocktail.note}</p>
            <button type="button" class="msg-trigger" data-drink="${cocktail.nameZh}" data-en="${cocktail.nameEn}" aria-label="查看并留言：${cocktail.nameZh}">
              💬 留言 <span class="msg-count" data-drink="${cocktail.nameZh}" hidden></span>
            </button>
          </div>
        </div>
        <div class="glass-wrap" aria-hidden="true">
          ${glassSvgs[cocktail.glass] || glassSvgs.coupe}
        </div>
      `;
      menu.appendChild(card);
    });
  </script>

  <!-- 留言功能：Firebase Firestore 实时 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA8-mBgssm_f6eD2qIKVxxA7NcCV66S1hA",
      authDomain: "menu-64e32.firebaseapp.com",
      projectId: "menu-64e32",
      storageBucket: "menu-64e32.firebasestorage.app",
      messagingSenderId: "568074493238",
      appId: "1:568074493238:web:5edbe358064debd490e797",
      measurementId: "G-KPK98C9E46"
    };

    let db = null;
    let all = [];
    let openDrink = null;
    let ready = false;

    const overlay = document.getElementById("msgOverlay");
    const sheet = overlay.querySelector(".msg-sheet");
    const titleEl = document.getElementById("msgTitle");
    const subEl = overlay.querySelector(".msg-sub");
    const listEl = document.getElementById("msgList");
    const form = document.getElementById("msgForm");
    const nickEl = document.getElementById("msgNick");
    const textEl = document.getElementById("msgText");
    const sendEl = document.getElementById("msgSend");

    try { nickEl.value = localStorage.getItem("lm_nick") || ""; } catch (e) {}

    // 初始化 Firebase；失败则降级（菜单照常，留言提示需联网）
    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      onSnapshot(collection(db, "comments"), (snap) => {
        all = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        ready = true;
        updateCounts();
        if (openDrink) renderList(openDrink);
      }, (err) => { console.warn("留言监听失败：", err); });
    } catch (e) {
      console.warn("Firebase 初始化失败：", e);
    }

    const secs = (c) => (c.createdAt && c.createdAt.seconds) ? c.createdAt.seconds : Number.MAX_SAFE_INTEGER;
    const forDrink = (drink) => all.filter((c) => c.drink === drink).sort((a, b) => secs(a) - secs(b));

    function updateCounts() {
      document.querySelectorAll(".msg-count").forEach((el) => {
        const n = all.filter((c) => c.drink === el.dataset.drink).length;
        if (n > 0) { el.textContent = n; el.hidden = false; } else { el.hidden = true; }
      });
    }

    function fmt(c) {
      if (!c.createdAt || !c.createdAt.seconds) return "刚刚";
      const d = new Date(c.createdAt.seconds * 1000);
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getMonth() + 1}月${d.getDate()}日 ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function renderList(drink) {
      listEl.innerHTML = "";
      if (!db) {
        const n = document.createElement("p");
        n.className = "msg-empty";
        n.textContent = "留言功能需要联网，请检查网络后重试。";
        listEl.appendChild(n);
        return;
      }
      const items = forDrink(drink);
      if (!items.length) {
        const n = document.createElement("p");
        n.className = "msg-empty";
        n.textContent = ready ? "还没有人留言，来当第一个 ✍️" : "加载中…";
        listEl.appendChild(n);
        return;
      }
      items.forEach((c) => {
        const row = document.createElement("div");
        row.className = "msg-item";
        const head = document.createElement("div");
        head.className = "msg-item-head";
        const nm = document.createElement("span");
        nm.className = "msg-name";
        nm.textContent = (c.nickname && c.nickname.trim()) ? c.nickname : "匿名";
        const tm = document.createElement("span");
        tm.className = "msg-time";
        tm.textContent = fmt(c);
        head.appendChild(nm);
        head.appendChild(tm);
        const bd = document.createElement("p");
        bd.className = "msg-body";
        bd.textContent = c.text;
        row.appendChild(head);
        row.appendChild(bd);
        listEl.appendChild(row);
      });
      listEl.scrollTop = listEl.scrollHeight;
    }

    function openModal(drink, en) {
      openDrink = drink;
      titleEl.textContent = drink;
      subEl.textContent = en || "";
      form.hidden = !db;
      renderList(drink);
      overlay.hidden = false;
      document.body.style.overflow = "hidden";
      setTimeout(() => { (db ? textEl : sheet).focus(); }, 30);
    }

    function closeModal() {
      overlay.hidden = true;
      openDrink = null;
      document.body.style.overflow = "";
    }

    document.addEventListener("click", (e) => {
      const trig = e.target.closest(".msg-trigger");
      if (trig) { openModal(trig.dataset.drink, trig.dataset.en); return; }
      if (e.target.closest(".msg-close")) { closeModal(); return; }
      if (e.target === overlay) { closeModal(); }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !overlay.hidden) closeModal();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!db || !openDrink) return;
      const text = textEl.value.trim();
      if (!text) { textEl.focus(); return; }
      const nickname = nickEl.value.trim().slice(0, 40);
      try { localStorage.setItem("lm_nick", nickname); } catch (e2) {}
      sendEl.disabled = true;
      try {
        await addDoc(collection(db, "comments"), {
          drink: openDrink,
          nickname: nickname,
          text: text.slice(0, 500),
          createdAt: serverTimestamp()
        });
        textEl.value = "";
      } catch (err) {
        console.warn("发送失败：", err);
        alert("发送失败了，稍后再试试～");
      } finally {
        sendEl.disabled = false;
        textEl.focus();
      }
    });
  </script>
</body>
</html>
